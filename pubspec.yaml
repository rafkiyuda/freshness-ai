name: freshness_ai
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.5.0
  
  # Navigation
  go_router: ^14.0.0
  
  # HTTP & API
  dio: ^5.7.0
  
  # Local Database (Offline)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Camera
  camera: ^0.11.0
  
  # AI Model
  tflite_flutter: ^0.11.0
  
  # Image
  image_picker: ^1.1.0
  image: ^4.3.0
  
  # Connectivity
  connectivity_plus: ^6.1.0
  
  # Environment
  flutter_dotenv: ^5.2.0
  
  # UI
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.0
  
  # Utils
  uuid: ^4.5.0
  intl: ^0.19.0
  path_provider: ^2.1.0

  cupertino_icons: ^1.0.8
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/models/
    - assets/images/
